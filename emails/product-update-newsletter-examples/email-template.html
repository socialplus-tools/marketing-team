<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Email Subject]</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #111111;
      font-family: 'Figtree', 'Inter', Arial, sans-serif;
      color: #ffffff;
    }
    .email-wrapper {
      max-width: 600px;
      margin: 0 auto;
      background-color: #111111;
    }
    .email-header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .email-body {
      padding: 40px;
    }
    .email-footer {
      padding: 24px 40px;
      border-top: 1px solid rgba(255,255,255,0.15);
      font-size: 12px;
      color: #a0a1a3;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.4;
      margin: 0 0 16px;
      color: #ffffff;
    }
    h2 {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.4;
      margin: 0 0 12px;
      color: #ffffff;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 16px;
      color: #d0d0d1;
    }
    .cta-button {
      display: inline-block;
      background-color: #3B41EC;
      color: #ffffff !important;
      font-family: 'Figtree', 'Inter', Arial, sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 8px;
      margin: 16px 0;
    }
    .cta-button:hover {
      background-color: #3769EC;
    }
    .gradient-bar {
      height: 4px;
      background: linear-gradient(to right, #3769EC, #3B41EC 50.5%, #45A5ED);
    }
    .highlight {
      color: #3B41EC;
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <!-- Gradient accent bar at top -->
    <div class="gradient-bar"></div>

    <!-- Header with logo -->
    <div class="email-header">
      <!-- Logo: use white SVG/PNG version of social.plus full name logo -->
      <img src="[LOGO_URL]" alt="social.plus" height="28" />
    </div>

    <!-- Main body -->
    <div class="email-body">
      <h1>[Headline]</h1>
      <p>[Body copy — direct, warm, specific]</p>
      <a href="[CTA_URL]" class="cta-button">[CTA Text]</a>
    </div>

    <!-- Footer -->
    <div class="email-footer">
      <p>© 2026 social.plus. All rights reserved.</p>
      <p>
        <a href="#" style="color: #a0a1a3;">Unsubscribe</a> ·
        <a href="#" style="color: #a0a1a3;">Privacy Policy</a> ·
        <a href="#" style="color: #a0a1a3;">Terms</a>
      </p>
    </div>
  </div>
</body>
</html>
