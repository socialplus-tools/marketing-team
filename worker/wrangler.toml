compatibility_date = "2024-09-01"

# ─── Plaintext variables (Webflow CMS collection IDs) ─────────────────────────
# These are PUBLIC identifiers — not secrets — so safe to commit to the repo.
# IMPORTANT: Wrangler deploy OVERWRITES plaintext vars in the dashboard with what's
# declared here. This file is the source of truth. Changes made in the dashboard
# will be reverted on next `wrangler deploy`.
[vars]
USE_CASES = "66e2765d540e1939a89db7a6"
PRICING_FEATURES = "66e2765d540e1939a89db7be"
RELEASE_NOTES = "697713f21a4cfd3f4db2768b"
PRODUCT_UPDATES = "66e2765d540e1939a89db971"
BLOG = "66e2765d540e1939a89db6a4"
GLOSSARY = "66e2765d540e1939a89db93e"
ANSWERS = "68f643838f7abffca74efbc1"
CUSTOMER_STORIES = "66e2765d540e1939a89db5eb"
WEBINARS = "66e2765d540e1939a89db84e"

# ─── Secrets (managed separately via Cloudflare dashboard or `wrangler secret put`) ─
# NEVER commit secret values. Current secrets (names only, values opaque):
#   GITHUB_TOKEN, ANTHROPIC_API_KEY, WEBFLOW_API_TOKEN, MAKE_WEBHOOK_URL, WORKER_AUTH_TOKEN
# These survive `wrangler deploy` untouched because they're stored encrypted and
# referenced by name, not value.
#
# To rotate a secret:
#   npx wrangler secret put SECRET_NAME --name socialplus-site-json
